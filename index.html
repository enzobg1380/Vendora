<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Vendora · Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style id="theme-style">
        /* Thème par défaut (sombre/violet) */
        :root {
            --bg-gradient-start: #1a1f35;
            --bg-gradient-end: #0c0f1a;
            --card-bg: rgba(20, 25, 45, 0.7);
            --card-bg-hover: rgba(30, 35, 60, 0.8);
            --primary-gradient: linear-gradient(145deg, #ff7eb3, #7a5fff);
            --text-primary: #fff;
            --text-secondary: #a0b4d0;
            --border-light: 1px solid rgba(255,255,255,0.08);
            --shadow-card: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
            --shadow-hover: 0 30px 50px -15px rgba(95,125,241,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            --accent-glow: 0 0 20px #7a5fff;
        }
        /* Thème clair */
        .theme-light {
            --bg-gradient-start: #f0f4fa;
            --bg-gradient-end: #d9e2ef;
            --card-bg: rgba(255,255,255,0.7);
            --card-bg-hover: rgba(255,255,255,0.9);
            --primary-gradient: linear-gradient(145deg, #ff7eb3, #7a5fff);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-light: 1px solid rgba(0,0,0,0.08);
            --shadow-card: 0 20px 40px -10px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.02);
            --shadow-hover: 0 30px 50px -15px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.05);
            --accent-glow: 0 0 20px #7a5fff;
        }
        /* Thème bleu */
        .theme-blue {
            --bg-gradient-start: #1e3a5f;
            --bg-gradient-end: #0d2b45;
            --card-bg: rgba(25, 55, 80, 0.7);
            --card-bg-hover: rgba(35, 65, 95, 0.8);
            --primary-gradient: linear-gradient(145deg, #5fa8ff, #2b6cbf);
            --text-primary: #fff;
            --text-secondary: #b0c4de;
            --border-light: 1px solid rgba(255,255,255,0.08);
            --shadow-card: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
            --shadow-hover: 0 30px 50px -15px #2b6cbf, 0 0 0 1px rgba(255,255,255,0.1);
            --accent-glow: 0 0 20px #2b6cbf;
        }
        /* Thème vert */
        .theme-green {
            --bg-gradient-start: #1e4a3a;
            --bg-gradient-end: #0d3a2a;
            --card-bg: rgba(30, 70, 50, 0.7);
            --card-bg-hover: rgba(40, 85, 65, 0.8);
            --primary-gradient: linear-gradient(145deg, #6fcf97, #2d9c5c);
            --text-primary: #fff;
            --text-secondary: #b0d0b0;
            --border-light: 1px solid rgba(255,255,255,0.08);
            --shadow-card: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
            --shadow-hover: 0 30px 50px -15px #2d9c5c, 0 0 0 1px rgba(255,255,255,0.1);
            --accent-glow: 0 0 20px #2d9c5c;
        }
        body {
            background: radial-gradient(circle at 20% 30%, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        .glass-card, .kpi-card, .chart-card, .platform-card, .add-sale-section, .sales-table-section, .stock-card, .profile-card, .profile-form, .formation-card, .week-card, .forecast-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            color: var(--text-primary);
        }
        .kpi-card::before {
            background: var(--primary-gradient);
        }
        .btn-primary {
            background: var(--primary-gradient);
        }
        .text-secondary, .kpi-title, .chart-period, .stock-details, .formation-meta, .forecast-desc, .stock-threshold, .form-group label {
            color: var(--text-secondary);
        }
        /* Styles généraux */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .app {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 30px 90px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: var(--border-light);
            border-radius: 60px;
            padding: 12px 24px;
            box-shadow: var(--shadow-card);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--primary-gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            color: white;
            box-shadow: var(--accent-glow);
            transform: rotate(3deg);
            transition: transform 0.2s;
        }
        .logo-icon:hover {
            transform: rotate(0deg) scale(1.05);
        }
        .logo-text {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffb6c1, #c0b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            padding: 4px 10px 4px 4px;
            border-radius: 40px;
            background: rgba(255,255,255,0.03);
            transition: background 0.2s;
        }
        .profile:hover {
            background: rgba(255,255,255,0.08);
        }
        .profile-info {
            text-align: right;
        }
        .profile-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 15px;
        }
        .profile-role {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .profile-pic {
            width: 44px;
            height: 44px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1), var(--accent-glow);
        }
        /* Sélecteur de thème rapide dans le header */
        .theme-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 12px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(15,23,42,0.35);
            border: 1px solid rgba(148,163,184,0.35);
            backdrop-filter: blur(18px);
        }
        .theme-pill {
            width: 26px;
            height: 26px;
            border-radius: 999px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
        }
        .theme-pill:hover {
            transform: translateY(-1px) scale(1.05);
            color: var(--text-primary);
            background: rgba(148,163,184,0.2);
            box-shadow: 0 0 0 1px rgba(148,163,184,0.6);
        }
        .theme-pill.theme-dark { }
        .theme-pill.theme-light { }
        .theme-pill.theme-blue { }
        .theme-pill.theme-green { }
        /* Barre de navigation en bas */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: var(--border-light);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 100;
            overflow-x: auto;
            max-width: 95vw;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        .nav-item {
            padding: 12px 24px;
            border-radius: 40px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-item:hover {
            background: rgba(122, 95, 255, 0.15);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--accent-glow);
        }
        .main-content {
            flex: 1;
        }
        /* Carte de bienvenue */
        .welcome-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: var(--shadow-card);
        }
        .welcome-text h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff7eb3, #c0b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-text p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
        }
        .feature-tags {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .feature-tag {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--text-primary);
            border: var(--border-light);
        }
        .welcome-icon {
            width: 120px;
            height: 120px;
            background: var(--primary-gradient);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: var(--accent-glow);
        }
        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            border-radius: 28px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: var(--shadow-card);
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }
        .kpi-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }
        .kpi-title {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .kpi-change {
            color: #48bb78;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            border-radius: 28px;
            padding: 20px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .chart-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 16px;
        }
        .chart-period {
            background: rgba(255,255,255,0.04);
            border: var(--border-light);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        canvas {
            max-height: 200px !important;
            width: 100% !important;
        }
        /* Revenue Card */
        .revenue-card {
            background: var(--primary-gradient);
            border-radius: 36px;
            padding: 32px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 45px -10px #7a5fff;
        }
        .revenue-card::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            filter: blur(50px);
        }
        .revenue-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .revenue-amount {
            font-size: 58px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .revenue-percent {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .revenue-footer {
            display: flex;
            gap: 30px;
            font-size: 15px;
            opacity: 0.9;
        }
        /* Platform Cards */
        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .platform-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            border-radius: 28px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .platform-card:hover {
            background: var(--card-bg-hover);
            transform: scale(1.02);
        }
        .platform-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .platform-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 26px;
        }
        .vinted-icon {
            background: rgba(0,102,255,0.2);
            color: #3b82f6;
            box-shadow: 0 0 20px #3b82f6;
        }
        .lbc-icon {
            background: rgba(255,107,0,0.2);
            color: #f97316;
            box-shadow: 0 0 20px #f97316;
        }
        .platform-info h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .platform-info .amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .platform-change {
            font-size: 18px;
            font-weight: 600;
            color: #48bb78;
        }
        /* Add Sale Form */
        .add-sale-section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            border-radius: 32px;
            padding: 26px;
            margin-bottom: 30px;
        }
        .section-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
        }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: var(--border-light);
            border-radius: 18px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #7a5fff;
            box-shadow: 0 0 0 4px rgba(122, 95, 255, 0.2);
        }
        .btn {
            padding: 14px 26px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 10px 20px -5px #7a5fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px #7a5fff;
        }
        .btn-outline {
            background: transparent;
            border: var(--border-light);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        /* Sales Table */
        .sales-table-section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: var(--border-light);
            border-radius: 32px;
            padding: 26px;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .table-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 18px;
        }
        .table-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-select, .search-input {
            background: rgba(0,0,0,0.3);
            border: var(--border-light);
            border-radius: 30px;
            padding: 8px 20px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }
        .search-input {
            min-width: 200px;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 14px 12px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        td {
            padding: 14px 12px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 14px;
        }
        .badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-vinted {
            background: rgba(0,102,255,0.15);
            color: #3b82f6;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .badge-lbc {
            background: rgba(255,107,0,0.15);
            color: #f97316;
            border: 1px solid rgba(249,115,22,0.3);
        }
        .badge-success {
            background: rgba(72,187,120,0.15);
            color: #48bb78;
            border: 1px solid rgba(72,187,120,0.3);
        }
        .badge-warning {
            background: rgba(237,137,54,0.15);
            color: #ed8936;
            border: 1px solid rgba(237,137,54,0.3);
        }
        .delete-btn {
            color: #f87171;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            background: rgba(248,113,113,0.1);
        }
        .delete-btn:hover {
            background: rgba(248,113,113,0.2);
        }
        /* Stock Grid */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stock-card {
            background: var(--card-bg);
            border: var(--border-light);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .stock-card.low-stock {
            border-color: rgba(248,113,113,0.8);
            box-shadow: 0 0 0 1px rgba(248,113,113,0.7), 0 16px 30px rgba(127,29,29,0.55);
        }
        .stock-card:hover {
            background: var(--card-bg-hover);
            transform: translateY(-6px);
        }
        .stock-image {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .stock-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .stock-image .placeholder {
            font-size: 40px;
            color: var(--text-secondary);
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .stock-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .stock-category {
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .stock-price {
            font-size: 22px;
            font-weight: 700;
            color: #7a5fff;
            margin: 10px 0 5px;
        }
        .stock-details {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 10px;
        }
        .stock-threshold {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .stock-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .quantity-input {
            width: 70px;
            background: rgba(0,0,0,0.3);
            border: var(--border-light);
            border-radius: 12px;
            padding: 8px;
            color: var(--text-primary);
            text-align: center;
        }
        .stock-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        /* Profile */
        .profile-section {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }
        .profile-card {
            background: var(--card-bg);
            border: var(--border-light);
            border-radius: 32px;
            padding: 32px;
            text-align: center;
        }
        .profile-avatar {
            width: 140px;
            height: 140px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
            margin: 0 auto 20px;
            cursor: pointer;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
        }
        .profile-form {
            background: var(--card-bg);
            border: var(--border-light);
            border-radius: 32px;
            padding: 32px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        /* Page Personnalisation */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .settings-card {
            background: var(--card-bg);
            border: var(--border-light);
            border-radius: 28px;
            padding: 24px;
        }
        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .theme-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .theme-option:hover {
            background: rgba(255,255,255,0.05);
        }
        .theme-option input[type="radio"] {
            accent-color: #7a5fff;
            width: 18px;
            height: 18px;
        }
        .widget-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .widget-checkbox input {
            accent-color: #7a5fff;
            width: 18px;
            height: 18px;
        }
        .shortcut-info {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        /* Bouton flottant pour mobile */
        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: var(--accent-glow);
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 100;
            border: none;
        }
        .fab:hover {
            transform: scale(1.1);
        }
        @media (max-width: 768px) {
            .app {
                padding: 20px 15px 90px;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .platform-grid {
                grid-template-columns: 1fr;
            }
            .profile-section {
                grid-template-columns: 1fr;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .bottom-nav {
                padding: 12px 12px;
                gap: 4px;
            }
            .nav-item {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e1e30;
            border-radius: 40px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: #a0aec0;
        }
        .modal-close:hover {
            color: #fff;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: slideIn 0.5s ease forwards;
        }
        /* Animations et styles supplémentaires pour les graphiques / insights */
        .chart-card {
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .chart-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 0 0, rgba(122,95,255,0.25), transparent 55%);
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        .chart-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(122,95,255,0.6);
        }
        .chart-card:hover::before {
            opacity: 1;
        }
        .chart-card canvas {
            filter: drop-shadow(0 12px 25px rgba(0,0,0,0.45));
        }
        .charts-grid .chart-card:nth-child(1) {
            animation-delay: 0.05s;
        }
        .charts-grid .chart-card:nth-child(2) {
            animation-delay: 0.12s;
        }
        @keyframes pulseSoft {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(122,95,255,0.45); }
            70% { transform: scale(1.01); box-shadow: 0 0 0 12px rgba(122,95,255,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(122,95,255,0); }
        }
        .revenue-card {
            animation: pulseSoft 3.5s ease-in-out infinite;
        }
        /* Cartes d'insights supplémentaires sur le dashboard */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin: 10px 0 28px;
        }
        .insight-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 18px 20px;
            border: var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .insight-card::after {
            content: '';
            position: absolute;
            right: -40px;
            top: -40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            opacity: 0.6;
            pointer-events: none;
        }
        .insight-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-secondary);
        }
        .insight-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .insight-sub {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .insight-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        /* Transition douce entre les pages */
        .page-transition {
            animation: slideIn 0.45s ease-out forwards;
        }
        /* Effet de cascade sur certains éléments */
        .kpi-grid .kpi-card:nth-child(1) { animation-delay: 0.02s; }
        .kpi-grid .kpi-card:nth-child(2) { animation-delay: 0.06s; }
        .kpi-grid .kpi-card:nth-child(3) { animation-delay: 0.10s; }
        .kpi-grid .kpi-card:nth-child(4) { animation-delay: 0.14s; }
        .stock-grid .stock-card:nth-child(1),
        .platform-grid .platform-card:nth-child(1) { animation-delay: 0.02s; }
        .stock-grid .stock-card:nth-child(2),
        .platform-grid .platform-card:nth-child(2) { animation-delay: 0.06s; }
        /* Confettis pour les nouvelles ventes */
        .confetti-piece {
            position: fixed;
            top: -10px;
            width: 8px;
            height: 14px;
            border-radius: 2px;
            z-index: 1200;
            opacity: 0.9;
            pointer-events: none;
            animation: confettiFall 1.4s ease-out forwards;
        }
        @keyframes confettiFall {
            0% {
                transform: translate3d(0, -40px, 0) rotateZ(0deg);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translate3d(20px, 110vh, 0) rotateZ(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Application accessible directement -->
    <div id="appContainer" class="app">
        <!-- Header avec logo -->
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">V</div>
                <span class="logo-text">Vendora</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="theme-switcher">
                    <button class="theme-pill theme-dark" onclick="selectTheme('dark')" title="Thème sombre">☾</button>
                    <button class="theme-pill theme-light" onclick="selectTheme('light')" title="Thème clair">☀</button>
                    <button class="theme-pill theme-blue" onclick="selectTheme('blue')" title="Bleu profond">🟦</button>
                    <button class="theme-pill theme-green" onclick="selectTheme('green')" title="Vert forêt">🌿</button>
                </div>
            <div class="profile" onclick="changePage('profil')">
                <div class="profile-info">
                    <div class="profile-name" id="headerName">Visiteur</div>
                    <div class="profile-role" id="headerRole">Vendeur</div>
                </div>
                <div class="profile-pic" id="headerAvatar">V</div>
            </div>
            </div>
        </div>

        <!-- Contenu principal -->
        <div class="main-content">
            <div id="contentArea"></div>
        </div>
    </div>

    <!-- Barre de navigation en bas -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" onclick="changePage('accueil')">Accueil</div>
        <div class="nav-item" onclick="changePage('dashboard')">Tableau de bord</div>
        <div class="nav-item" onclick="changePage('statistiques')">Statistiques</div>
        <div class="nav-item" onclick="changePage('achatvente')">Achat/Vente</div>
        <div class="nav-item" onclick="changePage('stock')">Stock</div>
        <div class="nav-item" onclick="changePage('personnalisation')">Personnalisation</div>
        <div class="nav-item" onclick="changePage('profil')">Profil</div>
    </div>

    <!-- Bouton flottant pour ajout rapide (mobile) -->
    <button class="fab" onclick="quickAddMobile()" title="Ajouter une vente rapide">+</button>

    <!-- Modal pour le stock -->
    <div class="modal" id="stockModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ajouter un produit au stock</h3>
                <span class="modal-close" onclick="closeStockModal()">&times;</span>
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Nom du produit</label>
                <input type="text" class="form-control" id="stockName" placeholder="Ex: Jean Levis">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Catégorie</label>
                <select class="form-control" id="stockCategory">
                    <option value="Vêtements">Vêtements</option>
                    <option value="Électronique">Électronique</option>
                    <option value="Maison">Maison</option>
                    <option value="Sports">Sports</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Prix (€)</label>
                <input type="number" class="form-control" id="stockPrice" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Quantité</label>
                <input type="number" class="form-control" id="stockQuantity" value="1" min="0">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Seuil d'alerte</label>
                <input type="number" class="form-control" id="stockThreshold" value="2" min="0">
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label>Description</label>
                <textarea class="form-control" id="stockDesc" rows="3"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label>Image du produit</label>
                <input type="file" id="stockImageInput" accept="image/*" style="display: none;">
                <button class="btn btn-outline" onclick="document.getElementById('stockImageInput').click()">Choisir une image</button>
                <span id="stockImageName" style="margin-left:10px; color:#a0b4d0;"></span>
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="addStock()">Ajouter au stock</button>
        </div>
    </div>

    <script>
        // ---------- Données ----------
        let sales = JSON.parse(localStorage.getItem('sales')) || [];
        let stock = JSON.parse(localStorage.getItem('stock')) || [];
        let profile = JSON.parse(localStorage.getItem('profile')) || {
            name: 'Visiteur',
            avatar: 'V',
            role: 'Vendeur'
        };

        let preferences = JSON.parse(localStorage.getItem('preferences')) || {
            theme: 'dark',
            widgets: {
                kpi: true,
                charts: true,
                platforms: true,
                addSale: true,
                recentSales: true
            },
            shortcuts: true,
            notifications: true
        };

        // Appliquer le thème
        function applyTheme(theme) {
            const body = document.body;
            body.classList.remove('theme-light', 'theme-blue', 'theme-green');
            if (theme === 'light') body.classList.add('theme-light');
            else if (theme === 'blue') body.classList.add('theme-blue');
            else if (theme === 'green') body.classList.add('theme-green');
        }
        applyTheme(preferences.theme);

        let revenueChart, platformChart, monthlyChart, statsLineChart;
        let currentStockFilter = 'toutes';
        let currentStockSearch = '';

        function updateHeader() {
            document.getElementById('headerName').textContent = profile.name;
            document.getElementById('headerRole').textContent = profile.role;
            document.getElementById('headerAvatar').textContent = profile.avatar;
        }
        updateHeader();

        function changePage(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            loadPage(page);
        }

        function loadPage(page) {
            const area = document.getElementById('contentArea');
            let html = '';
            switch(page) {
                case 'accueil':
                    html = getAccueilPage();
                    break;
                case 'dashboard':
                    html = getDashboardPage();
                    break;
                case 'statistiques':
                    html = getStatistiquesPage();
                    break;
                case 'achatvente':
                    html = getAchatVentePage();
                    break;
                case 'stock':
                    html = getStockPage();
                    break;
                case 'profil':
                    html = getProfilPage();
                    break;
                case 'personnalisation':
                    html = getPersonnalisationPage();
                    break;
                default:
                    html = getAccueilPage();
            }
            area.innerHTML = `<div class="page-transition">${html}</div>`;
            // Initialisations spécifiques après rendu
            if (page === 'dashboard') {
                setTimeout(() => { initDashboardCharts(); updateDashboardCharts(); }, 100);
            } else if (page === 'statistiques') {
                setTimeout(() => { initStatistiquesCharts(); }, 100);
            } else if (page === 'stock') {
                setTimeout(() => { initStockFilters(); }, 100);
            }
        }

        // Page Accueil
        function getAccueilPage() {
            const totalRevenue = sales.reduce((a,b)=>a+b.price,0);
            const nbSales = sales.length;
            const hasData = nbSales > 0;
            const vintedTotal = sales.filter(s=>s.platform==='vinted').reduce((a,b)=>a+b.price,0);
            const lbcTotal = sales.filter(s=>s.platform==='leboncoin').reduce((a,b)=>a+b.price,0);
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Bonjour' : (hour < 18 ? 'Bon après-midi' : 'Bonsoir');

            return `
                <div class="welcome-card animate-in">
                    <div class="welcome-text">
                        <h1>${greeting}, bienvenue sur Vendora</h1>
                        <p>Votre assistant personnel pour gérer vos ventes sur Vinted et Le Bon Coin. Suivez vos revenus, gérez votre stock, et progressez.</p>
                        <div class="feature-tags">
                            <div class="feature-tag"><span style="font-size:24px;">📊</span> Statistiques en temps réel</div>
                            <div class="feature-tag"><span style="font-size:24px;">📦</span> Gestion de stock</div>
                            ${hasData ? `<div class="feature-tag"><span style="font-size:24px;">💶</span> ${formatPrice(totalRevenue)} générés</div>` : ''}
                        </div>
                    </div>
                    <div class="welcome-icon">🚀</div>
                </div>
                <div style="text-align: center; margin-top: 40px; color: var(--text-secondary);">
                    ${hasData
                        ? `<p>Vous avez déjà enregistré <strong>${nbSales}</strong> vente${nbSales>1?'s':''} (${formatPrice(vintedTotal)} sur Vinted, ${formatPrice(lbcTotal)} sur Le Bon Coin).</p>`
                        : `<p>Aucune vente enregistrée pour l’instant. Commencez par ajouter votre première vente dans le tableau de bord !</p>`}
                </div>
            `;
        }

        // Page Dashboard
        function getDashboardPage() {
            const today = new Date().toDateString();
            const todaySales = sales.filter(s => new Date(s.date).toDateString() === today);
            const todayTotal = todaySales.reduce((a,b)=>a+b.price,0);
            const weekSales = sales.filter(s => new Date(s.date) >= new Date(Date.now()-7*86400000));
            const weekTotal = weekSales.reduce((a,b)=>a+b.price,0);
            const monthSales = sales.filter(s => new Date(s.date) >= new Date(Date.now()-30*86400000));
            const monthTotal = monthSales.reduce((a,b)=>a+b.price,0);
            const vintedTotal = sales.filter(s=>s.platform==='vinted').reduce((a,b)=>a+b.price,0);
            const lbcTotal = sales.filter(s=>s.platform==='leboncoin').reduce((a,b)=>a+b.price,0);
            const totalRevenue = sales.reduce((a,b)=>a+b.price,0);

            // Insights avancés (meilleur jour, produit top, panier moyen)
            let bestDayLabel = '—';
            let bestDayValue = 0;
            let avgBasket = 0;
            let topProductName = '—';
            let topProductRevenue = 0;
            let streakDays = 0;

            if (sales.length > 0) {
                // Regroupement par jour
                const byDay = {};
                const byProduct = {};
                sales.forEach(s => {
                    const d = new Date(s.date);
                    const key = d.toDateString();
                    byDay[key] = (byDay[key] || 0) + s.price;
                    byProduct[s.product] = (byProduct[s.product] || 0) + s.price;
                });

                Object.keys(byDay).forEach(k => {
                    if (byDay[k] > bestDayValue) {
                        bestDayValue = byDay[k];
                        bestDayLabel = new Date(k).toLocaleDateString('fr-FR');
                    }
                });

                Object.keys(byProduct).forEach(p => {
                    if (byProduct[p] > topProductRevenue) {
                        topProductRevenue = byProduct[p];
                        topProductName = p || 'Produit sans nom';
                    }
                });

                avgBasket = totalRevenue / sales.length;

                // Série de jours consécutifs avec au moins une vente (en partant d'aujourd'hui)
                let cursor = new Date();
                while (true) {
                    const hasSales = sales.some(s => new Date(s.date).toDateString() === cursor.toDateString());
                    if (hasSales) {
                        streakDays++;
                        cursor.setDate(cursor.getDate() - 1);
                    } else {
                        break;
                    }
                }
            }

            let html = `
                <div class="revenue-card animate-in">
                    <div class="revenue-label">CHIFFRE D'AFFAIRES TOTAL</div>
                    <div class="revenue-amount">${formatPrice(totalRevenue)}</div>
                    <div class="revenue-percent">${sales.length} vente${sales.length>1?'s':''}</div>
                    <div class="revenue-footer"><div>📦 Toutes plateformes</div><div>⏰ Depuis le début</div></div>
                </div>
            `;
            // Bloc d'insights si au moins une vente
            if (sales.length > 0) {
                html += `
                <div class="insights-grid animate-in">
                    <div class="insight-card">
                        <div class="insight-icon">🏆</div>
                        <div class="insight-label">Meilleur jour</div>
                        <div class="insight-value">${bestDayLabel}</div>
                        <div class="insight-sub">${formatPrice(bestDayValue)} sur cette journée</div>
                    </div>
                    <div class="insight-card">
                        <div class="insight-icon">🛒</div>
                        <div class="insight-label">Panier moyen</div>
                        <div class="insight-value">${formatPrice(avgBasket || 0)}</div>
                        <div class="insight-sub">${sales.length} vente${sales.length>1?'s':''} au total</div>
                    </div>
                    <div class="insight-card">
                        <div class="insight-icon">⭐</div>
                        <div class="insight-label">Produit le plus rentable</div>
                        <div class="insight-value">${topProductName}</div>
                        <div class="insight-sub">${formatPrice(topProductRevenue || 0)} générés</div>
                    </div>
                    <div class="insight-card">
                        <div class="insight-icon">🔥</div>
                        <div class="insight-label">Série de jours avec ventes</div>
                        <div class="insight-value">${streakDays || 0} jour${streakDays>1?'s':''}</div>
                        <div class="insight-sub">Nombre de jours consécutifs avec au moins une vente</div>
                    </div>
                </div>
                `;
            }
            if (preferences.widgets.kpi) {
                html += `
                <div class="kpi-grid">
                    <div class="kpi-card animate-in"><div class="kpi-title">Aujourd'hui</div><div class="kpi-value">${formatPrice(todayTotal)}</div><div class="kpi-change">▲ ${todaySales.length} vente(s)</div></div>
                    <div class="kpi-card animate-in"><div class="kpi-title">Cette semaine</div><div class="kpi-value">${formatPrice(weekTotal)}</div><div class="kpi-change">▲ ${weekSales.length} vente(s)</div></div>
                    <div class="kpi-card animate-in"><div class="kpi-title">Ce mois</div><div class="kpi-value">${formatPrice(monthTotal)}</div><div class="kpi-change">▲ ${monthSales.length} vente(s)</div></div>
                    <div class="kpi-card animate-in"><div class="kpi-title">Stock</div><div class="kpi-value">${stock.reduce((a,b)=>a+b.quantity,0)}</div><div class="kpi-change">📦 ${stock.length} produit(s)</div></div>
                </div>
                `;
            }
            if (preferences.widgets.charts) {
                html += `
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header"><span class="chart-title">Évolution (30 jours)</span><span class="chart-period">Journalier</span></div>
                        <canvas id="revenueChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header"><span class="chart-title">Répartition</span><span class="chart-period">Vinted/LBC</span></div>
                        <canvas id="platformChart"></canvas>

        // --- Page Stock ---
        function getStockPage() {
            const categories = [...new Set(stock.map(item => item.category))];
            const categoryOptions = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
            return `
                <div class="sales-table-section">
                    <div class="table-header">
                        <span class="table-title">📦 Gestionnaire de Stock</span>

        function getFilteredStock() {
            let filtered = stock;
            if (currentStockFilter !== 'toutes') {
                filtered = filtered.filter(item => item.category === currentStockFilter);
            }
            if (currentStockSearch) {
                const searchLower = currentStockSearch.toLowerCase();
                filtered = filtered.filter(item => item.name.toLowerCase().includes(searchLower));
            }
            if (filtered.length === 0) {
                return '<p style="text-align:center; padding:20px;">Aucun produit trouvé</p>';
            }
            return filtered.map(item => `
                <div class="stock-card ${item.quantity <= (item.threshold || 2) ? 'low-stock' : ''} animate-in">
                    <div class="stock-image" onclick="uploadStockImage(${item.id})">
                        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '<div class="placeholder">📷</div>'}
                        <input type="file" id="file_${item.id}" accept="image/*" style="display: none;" onchange="handleStockImageUpload(${item.id}, this)">
                    </div>
                    <div class="stock-header">
                        <span class="stock-name">${item.name}</span>
                        <span class="stock-category">${item.category}</span>
                    </div>
                    <div class="stock-price">${formatPrice(item.price)}</div>
                    <div class="stock-details">
                        <span>Qté: ${item.quantity}</span>
                        <span>${item.description || ''}</span>
                    </div>
                    <div class="stock-threshold">Seuil: ${item.threshold || 2}</div>
                    <div class="stock-quantity">
                        <input type="number" class="quantity-input" id="qty_${item.id}" value="${item.quantity}" min="0">
                        <button class="btn btn-outline btn-sm" onclick="updateStockQuantity(${item.id})">MàJ</button>
                    </div>
                    <div class="stock-actions">
                        <button class="btn btn-outline btn-sm" onclick="deleteStockItem(${item.id})">Supprimer</button>
                    </div>
                    <div style="margin-top:10px;">
                        ${item.quantity <= (item.threshold || 2) ? 
                            '<span class="badge badge-warning">⚠️ Stock faible</span>' : 
                            '<span class="badge badge-success">✔️ En stock</span>'}
                    </div>
                </div>
            `).join('');
        }

        function filterStock() {
            const filterEl = document.getElementById('stockCategoryFilter');
            const searchEl = document.getElementById('stockSearch');
            if (filterEl) currentStockFilter = filterEl.value;
            if (searchEl) currentStockSearch = searchEl.value;
            document.getElementById('stockGridContainer').innerHTML = getFilteredStock();
        }

        function initStockFilters() {
            currentStockFilter = 'toutes';
            currentStockSearch = '';
            filterStock();
        }

        // Fonctions pour les images
        function uploadStockImage(id) {
            document.getElementById(`file_${id}`).click();
        }

        function handleStockImageUpload(id, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const item = stock.find(s => s.id === id);
                if (item) {
                    item.image = e.target.result;
                    localStorage.setItem('stock', JSON.stringify(stock));
                    filterStock();
                }
            };
            reader.readAsDataURL(file);
        }

        // Stock modal
        function openStockModal() {
            document.getElementById('stockModal').classList.add('active');
            document.getElementById('stockName').value = '';
            document.getElementById('stockCategory').value = 'Vêtements';
            document.getElementById('stockPrice').value = '';
            document.getElementById('stockQuantity').value = '1';
            document.getElementById('stockThreshold').value = '2';
            document.getElementById('stockDesc').value = '';
            document.getElementById('stockImageName').textContent = '';
        }

        function closeStockModal() {
            document.getElementById('stockModal').classList.remove('active');
        }

        function addStock() {
            const name = document.getElementById('stockName').value.trim();
            const category = document.getElementById('stockCategory').value;
            const price = parseFloat(document.getElementById('stockPrice').value);
            const quantity = parseInt(document.getElementById('stockQuantity').value) || 1;
            const threshold = parseInt(document.getElementById('stockThreshold').value) || 2;
            const description = document.getElementById('stockDesc').value.trim();
            const imageInput = document.getElementById('stockImageInput');
            let image = null;

            if (!name || isNaN(price)) {
                alert('Veuillez remplir le nom et le prix.');
                return;
            }

            if (imageInput.files.length > 0) {
                const file = imageInput.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    image = e.target.result;
                    finalizeAdd(name, category, price, quantity, threshold, description, image);
                };
                reader.readAsDataURL(file);
            } else {
                finalizeAdd(name, category, price, quantity, threshold, description, image);
            }
        }

        function finalizeAdd(name, category, price, quantity, threshold, description, image) {
            const newItem = {
                id: Date.now(),
                name,
                category,
                price,
                quantity,
                threshold,
                description,
                image
            };
            stock.push(newItem);
            localStorage.setItem('stock', JSON.stringify(stock));
            closeStockModal();
            if (preferences.notifications) {
                showNotification('Produit ajouté', `${name} a été ajouté au stock.`);
            }
            filterStock();
        }

        function updateStockQuantity(id) {
            const input = document.getElementById(`qty_${id}`);
            const newQty = parseInt(input.value);
            const item = stock.find(s => s.id === id);
            if (item) {
                const oldQty = item.quantity;
                item.quantity = newQty;
                localStorage.setItem('stock', JSON.stringify(stock));
                filterStock();
                if (preferences.notifications && newQty <= item.threshold && oldQty > item.threshold) {
                    showNotification('Stock faible', `${item.name} est en dessous du seuil (${item.threshold}).`);
                }
            }
        }

        function deleteStockItem(id) {
            if (confirm('Voulez-vous vraiment supprimer ce produit ?')) {
                stock = stock.filter(s => s.id !== id);
                localStorage.setItem('stock', JSON.stringify(stock));
                filterStock();
                if (preferences.notifications) {
                    showNotification('Produit supprimé', 'Le produit a été supprimé du stock.');
                }
            }
        }

                    changePage('dashboard');
                    setTimeout(() => document.getElementById('saleProduct')?.focus(), 200);

                e.preventDefault();

        // --- Notifications ---
        function showNotification(title, body) {
            if (!preferences.notifications) return;
            if (window.Notification && Notification.permission === 'granted') {
                new Notification(title, { body });
            } else if (window.Notification && Notification.permission !== 'denied') {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        new Notification(title, { body });
                    }
                });
            } else {
                alert(`${title}: ${body}`);
            }

        // Effet confettis simple pour les nouvelles ventes
        function triggerConfetti() {
            const colors = ['#f97316', '#22c55e', '#3b82f6', '#a855f7', '#eab308', '#ef4444'];
            const pieces = 70;
            for (let i = 0; i < pieces; i++) {
                const div = document.createElement('div');
                div.className = 'confetti-piece';
                const color = colors[Math.floor(Math.random() * colors.length)];
                div.style.backgroundColor = color;
                div.style.left = Math.random() * 100 + 'vw';
                div.style.animationDelay = (Math.random() * 0.3) + 's';
                div.style.transform = `rotateZ(${Math.random()*360}deg)`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 1800);
            }
        }

        if (window.Notification && Notification.permission === 'default') {
            Notification.requestPermission();

        // --- Ventes ---
        function addSale() {
            const platform = document.getElementById('salePlatform')?.value;
            const product = document.getElementById('saleProduct')?.value.trim();
            const price = parseFloat(document.getElementById('salePrice')?.value);
            let date = document.getElementById('saleDate')?.value;
            if (!product || isNaN(price)) { alert('Veuillez remplir tous les champs'); return; }
            if (!date) date = new Date().toISOString().split('T')[0];
            const newSale = { id: Date.now(), platform, product, price, date: new Date(date).toISOString() };
            sales.push(newSale);
            localStorage.setItem('sales', JSON.stringify(sales));
            document.getElementById('saleProduct').value = '';
            document.getElementById('salePrice').value = '';
            document.getElementById('saleDate').value = '';
            if (preferences.notifications) {
                showNotification('Vente ajoutée', `${product} vendu ${formatPrice(price)}`);
            }
            // petit effet de confettis pour célébrer la vente
            triggerConfetti();
            loadPage('dashboard');
        }

            if(!revenueChart||!platformChart) return;
            let last30Days = [], labels = [];
            for(let i=29;i>=0;i--) { let d=new Date(); d.setDate(d.getDate()-i); labels.push(d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})); last30Days.push(sales.filter(s=>new Date(s.date).toDateString()===d.toDateString()).reduce((a,b)=>a+b.price,0)); }
            revenueChart.data.labels = labels; 
            revenueChart.data.datasets[0].data = last30Days; 
            revenueChart.update();

            const vintedCount = sales.filter(s => s.platform === 'vinted').length;
            const lbcCount = sales.filter(s => s.platform === 'leboncoin').length;
            platformChart.data.datasets[0].data = [vintedCount, lbcCount];
            platformChart.update();
        }

        function initStatistiquesCharts() {
            const ctxLine = document.getElementById('statsLineChart')?.getContext('2d');
            if(ctxLine) {
                statsLineChart = new Chart(ctxLine, {
                    type: 'line',
                    data: { labels: [], datasets: [{ label:'Revenus', data:[], borderColor:'#7a5fff', backgroundColor:'rgba(122,95,255,0.18)', tension:0.35, fill:true, pointBackgroundColor:'#fff', pointBorderColor:'#7a5fff', pointRadius:3, hoverRadius:5 }] },
                    options: { 
                        responsive:true, 
                        maintainAspectRatio:false, 
                        plugins:{ 
                            legend:{ display:false },
                            tooltip:{
                                backgroundColor:'rgba(15,23,42,0.92)',
                                padding:10,
                                cornerRadius:12,
                                callbacks:{
                                    label:(ctx)=>` ${ctx.parsed.y.toFixed(2).replace('.',',')} €`
                                }
                            }
                        }, 
                        animation:{
                            duration:900,
                            easing:'easeOutQuart'
                        },
                        scales:{ 
                            x:{ 
                                ticks:{ color:'#a0b4d0', maxTicksLimit:6 }, 
                                grid:{ display:false } 
                            }, 
                            y:{ 
                                ticks:{ color:'#a0b4d0', callback:v=>v+'€' }, 
                                grid:{ color:'rgba(148,163,184,0.15)' }
                            } 
                        } 
                    }
                });
                let last30Days = [], labels = [];
                for(let i=29;i>=0;i--) {
                    let d = new Date();
                    d.setDate(d.getDate() - i);
                    labels.push(d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}));
                    last30Days.push(sales.filter(s => new Date(s.date).toDateString() === d.toDateString()).reduce((a,b)=>a+b.price,0));
                }
                statsLineChart.data.labels = labels;
                statsLineChart.data.datasets[0].data = last30Days;
                statsLineChart.update();
            }

            const ctxBar = document.getElementById('monthlyChart')?.getContext('2d');
            if(ctxBar) {
                const months = {};
                sales.forEach(s => {
                    const d = new Date(s.date);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    months[key] = (months[key] || 0) + s.price;
                });
                const sortedMonths = Object.keys(months).sort();
                const data = sortedMonths.map(m => months[m]);
                monthlyChart = new Chart(ctxBar, {
                    type: 'bar',
                    data: { labels: sortedMonths, datasets: [{ label: 'Ventes (€)', data: data, backgroundColor: '#7a5fff', borderRadius: 8 }] },
                    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{ color:'#a0b4d0' } }, y:{ ticks:{ color:'#a0b4d0', callback: v => v+'€' } } } }
                });
            }
        }

        function exportPDF() {
            const totalRevenue = sales.reduce((a,b)=>a+b.price,0);
            const nbVentes = sales.length;
            const vintedTotal = sales.filter(s=>s.platform==='vinted').reduce((a,b)=>a+b.price,0);
            const lbcTotal = sales.filter(s=>s.platform==='leboncoin').reduce((a,b)=>a+b.price,0);
            const content = `Rapport Vendora\n\nChiffre d'affaires total : ${formatPrice(totalRevenue)}\nNombre de ventes : ${nbVentes}\nVinted : ${formatPrice(vintedTotal)}\nLe Bon Coin : ${formatPrice(lbcTotal)}\nDate : ${new Date().toLocaleDateString('fr-FR')}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'rapport_vendora.txt';
            link.click();
        }

        function formatPrice(p) { return p.toFixed(2).replace('.',',') + ' €'; }

        // Initialisation
        loadPage('accueil');
        document.querySelectorAll('.nav-item')[0].classList.add('active');
    </script>
</body>
</html>
